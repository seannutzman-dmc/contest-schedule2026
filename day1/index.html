<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta http-equiv="refresh" content="1800"> <!-- hard refresh every 30 minutes as a safety net -->
  <title>District Music Contest — Day 1</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    :root{
      --bg: #0b1220;
      --panel: rgba(255,255,255,.06);
      --panel-strong: rgba(255,255,255,.10);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.72);
      --accent: #d8b45a; /* warm “gold” */
      --line: rgba(255,255,255,.12);

      --header-h: 160px;
      --radius: 18px;

      --title-size: clamp(38px, 3.0vw, 64px);
      --subhead-size: clamp(22px, 1.6vw, 34px);

      --section-title: clamp(28px, 2.1vw, 44px);
      --cell-size: clamp(18px, 1.2vw, 28px);

      --pad: clamp(16px, 1.2vw, 28px);
      --row-pad-y: clamp(10px, 0.9vw, 18px);
      --row-pad-x: clamp(10px, 1.0vw, 18px);

      /* Scroll speed control: px per second (higher = faster) */
      --px-per-sec: 40;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body{
      margin:0;
      font-family: Montserrat, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 800px at 20% 0%, rgba(216,180,90,.10), transparent 55%),
                  radial-gradient(900px 700px at 100% 10%, rgba(120,200,255,.10), transparent 55%),
                  var(--bg);
      color: var(--text);
      overflow: hidden; /* signage-friendly */
    }

    .app{
      height: 100%;
      display: grid;
      grid-template-rows: var(--header-h) 1fr;
    }

    header{
      padding: var(--pad);
      display:flex;
      align-items:flex-end;
      justify-content: space-between;
      gap: 24px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(to bottom, rgba(0,0,0,.25), rgba(0,0,0,.00));
    }

    .titles{
      display:flex;
      flex-direction: column;
      gap: 10px;
      min-width: 0;
    }

    .title{
      font-weight: 800;
      letter-spacing: .5px;
      font-size: var(--title-size);
      line-height: 1.05;
      color: rgba(255,255,255,.96);
      text-shadow: 0 10px 30px rgba(0,0,0,.35);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .subtitle{
      font-weight: 700;
      font-size: var(--subhead-size);
      color: var(--muted);
      display:flex;
      align-items:center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(216,180,90,.35);
      background: rgba(216,180,90,.10);
      color: rgba(255,255,255,.88);
      font-weight: 700;
      letter-spacing: .2px;
    }

    .meta{
      display:flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      text-align: right;
      min-width: 280px;
    }

    .meta .updated{
      font-size: 16px;
      color: var(--muted);
      font-weight: 600;
    }

    .meta .hint{
      font-size: 14px;
      color: rgba(255,255,255,.55);
      font-weight: 600;
    }

    /* Scroll viewport */
    .viewport{
      position: relative;
      height: 100%;
      overflow: hidden;
      padding: var(--pad);
    }

    .panel{
      height: 100%;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: rgba(255,255,255,.04);
      overflow: hidden;
      position: relative;
    }

    .scroll-track{
      will-change: transform;
    }

    /* We apply animation via JS after measuring height */
    .is-scrolling .scroll-track{
      animation-name: marqueeY;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
      animation-duration: var(--scroll-duration, 60s);
    }

    @keyframes marqueeY{
      from { transform: translateY(0); }
      to   { transform: translateY(calc(-1 * var(--scroll-distance, 1000px))); }
    }

    .content{
      padding: var(--pad);
      display:flex;
      flex-direction: column;
      gap: 22px;
    }

    .section{
      border-radius: calc(var(--radius) - 6px);
      border: 1px solid var(--line);
      background: var(--panel);
      overflow: hidden;
    }

    .section-header{
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px;
      background: linear-gradient(to right, rgba(216,180,90,.15), transparent 55%);
      border-bottom: 1px solid var(--line);
    }

    .section-title{
      font-size: var(--section-title);
      font-weight: 800;
      letter-spacing: .3px;
      margin: 0;
      line-height: 1.1;
    }

    .section-note{
      font-size: 14px;
      font-weight: 700;
      color: rgba(255,255,255,.60);
      white-space: nowrap;
    }

    table{
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    thead th{
      font-size: calc(var(--cell-size) * 0.95);
      text-transform: uppercase;
      letter-spacing: .08em;
      color: rgba(255,255,255,.70);
      font-weight: 800;
      padding: 14px var(--row-pad-x);
      background: var(--panel-strong);
      border-bottom: 1px solid var(--line);
      text-align: left;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    tbody td{
      font-size: var(--cell-size);
      font-weight: 700;
      padding: var(--row-pad-y) var(--row-pad-x);
      border-bottom: 1px solid rgba(255,255,255,.08);
      vertical-align: top;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    tbody tr:nth-child(2n){
      background: rgba(255,255,255,.03);
    }

    /* If you have long school names, allow wrapping in the middle columns */
    td.wrap{
      white-space: normal;
      line-height: 1.15;
    }

    .error{
      padding: 22px;
      color: rgba(255,220,220,.92);
      font-weight: 700;
    }

    .loading{
      padding: 22px;
      color: rgba(255,255,255,.78);
      font-weight: 700;
    }

    /* TV-friendly: reduce motion if platform requests */
    @media (prefers-reduced-motion: reduce){
      .is-scrolling .scroll-track{ animation: none !important; }
    }
  </style>
</head>

<body>
  <div class="app">
    <header>
      <div class="titles">
        <div class="title">District Music Contest</div>
        <div class="subtitle">
          <span class="badge">Day 1</span>
          <span>Thursday, April 23</span>
        </div>
      </div>
      <div class="meta">
        <div class="updated" id="updated">Updating…</div>
        <div class="hint">Continuous scroll • Auto-refresh data</div>
      </div>
    </header>

    <main class="viewport">
      <div class="panel" id="panel">
        <div class="scroll-track" id="track">
          <div class="content" id="content">
            <div class="loading">Loading schedules…</div>
          </div>
        </div>
      </div>
    </main>
  </div>

  }

  function cacheBusted(url){
    const u = new URL(url);

    return u.toString();

  function isRowEmpty(cells){
    return cells.every(v => (v ?? "").toString().trim() === "");

  function sliceBG(row){
    const sliced = row.slice(COL_START, COL_END_EXCLUSIVE).map(v => (v ?? "").toString().trim());
    return sliced;
  }

  function looksLikeHeaderRow(row){
    // Heuristic only: if many cells have letters and are relatively short, treat as header
    const cells = row.map(x => (x ?? "").toString().trim()).filter(Boolean);

    const letterish = cells.filter(c => /[A-Za-z]/.test(c)).length;
    const shortish = cells.filter(c => c.length <= 22).length;
    return letterish >= Math.ceil(cells.length * 0.7) && shortish >= Math.ceil(cells.length * 0.6);
  }
